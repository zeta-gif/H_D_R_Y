<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Creadores del Proyecto</title>
  <link rel="icon" type="image/png" href="img/favicon.png">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&family=Quicksand:wght@500;700&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Quicksand', sans-serif;
      
     
      background: linear-gradient(45deg, #fbc2eb 0%, #a6c1ee 50%, #b18bfb 100%);
      background-size: 200% 200%;
      background-attachment: fixed;
      animation: movimientoFondo 12s ease infinite alternate;
      
      color: #2c3e50;
      padding: 40px 20px 60px 20px;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      position: relative;
      overflow-x: hidden;
    }

    @keyframes movimientoFondo {
      0% { background-position: 0% 50%; }
      100% { background-position: 100% 50%; }
    }


    body::before {
      content: "";
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background-image: 
        radial-gradient(circle at 15% 20%, rgba(255, 255, 255, 0.4) 0%, transparent 20%),
        radial-gradient(circle at 85% 80%, rgba(255, 255, 255, 0.3) 0%, transparent 25%);
      pointer-events: none;
      z-index: 1;
    }

   
    .estrella-flotante {
      position: absolute;
      width: 24px;
      height: 24px;
      background: white;
      clip-path: polygon(50% 0%, 61% 39%, 100% 50%, 61% 61%, 50% 100%, 39% 61%, 0% 50%, 39% 39%);
      z-index: 1;
      opacity: 0;
      pointer-events: none;
      user-select: none;
      animation: caerYGirarEstrella 12s linear infinite;
    }

    @keyframes caerYGirarEstrella {
      0% { transform: translateY(-50px) rotate(0deg); opacity: 0; }
      10% { opacity: 0.8; }
      50% { transform: translateY(50vh) rotate(180deg) scale(1.2); opacity: 0.9; }
      90% { opacity: 0.8; }
      100% { transform: translateY(100vh) rotate(360deg) scale(0.8); opacity: 0; }
    }

    
    .container { 
      max-width: 900px; 
      width: 100%;
      margin: 0 auto; 
      z-index: 2;
      position: relative;
    }

    h1 { 
      font-family: 'Fredoka', sans-serif;
      color: #fff; 
      font-size: clamp(2rem, 7vw, 3.2rem); 
      margin-bottom: 10px; 
      text-align: center; 
      /* Borde de texto 3D */
      text-shadow: -3px -3px 0 #3f51b5, 3px -3px 0 #3f51b5, -3px 4px 0 #3f51b5, 3px 4px 0 #3f51b5,
                   0px 6px 0px #ffeb3b, 0px 10px 15px rgba(0,0,0,0.15);
    }

    .subtitle {
      text-align: center;
      font-size: 1.2rem;
      font-weight: 700;
      color: #fff;
      text-shadow: 0px 2px 4px rgba(0,0,0,0.2);
      margin-bottom: 40px;
    }


    .team-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 25px;
      margin-top: 20px;
    }

    
    .member-card {
      background: rgba(255, 255, 255, 0.96);
      padding: 35px 25px;
      border-radius: 40px;
      border: 5px solid #fff;
      box-shadow: 0 12px 25px rgba(0,0,0,0.1);
      transition: all 0.2s ease;
      text-align: center;
    }

    .member-card:hover {
      transform: translateY(-5px);
    }

    
    .member-card:nth-of-type(1) { border-top: 10px solid #60a5fa; } /* Azul */
    .member-card:nth-of-type(2) { border-top: 10px solid #f472b6; } /* Rosa */
    .member-card:nth-of-type(3) { border-top: 10px solid #34d399; } /* Verde */
    .member-card:nth-of-type(4) { border-top: 10px solid #fbbf24; } /* Amarillo */

    .avatar { 
      font-size: 2.2rem; 
      background: #f1f5f9; 
      width: 80px; 
      height: 80px; 
      border-radius: 50%; 
      margin: 0 auto 20px;
      display: flex; 
      align-items: center; 
      justify-content: center;
      border: 4px solid #e2e8f0;
    }

    .name { 
      font-family: 'Fredoka', sans-serif;
      font-size: 1.35rem; 
      font-weight: 700; 
      color: #1e293b; 
      margin-bottom: 8px; 
    }
    
    .role { 
      font-size: 1.05rem; 
      color: #64748b; 
      font-weight: 600;
    }

    /* --- BOTON VOLVER ATRAS --- */
    .back-button {
      display: block;
      width: fit-content;
      margin: 50px auto 0;
      padding: 14px 40px;
      background: #4a148c;
      color: white;
      text-decoration: none;
      border-radius: 30px;
      font-family: 'Fredoka', sans-serif;
      font-weight: 700;
      font-size: 1.2rem;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      border: 3px solid #fff;
      box-shadow: 0 6px 0 #2a085c;
      transition: all 0.15s ease;
      text-align: center;
    }

    .back-button:hover { 
      transform: translateY(-2px);
      filter: brightness(1.1);
    }
    
    .back-button:active {
      transform: translateY(4px);
      box-shadow: 0 2px 0 rgba(0,0,0,0.2);
    }

    
    @media (max-width: 600px) {
      body { padding: 20px 10px; }
      .team-grid { grid-template-columns: 1fr; gap: 20px; }
      .member-card { padding: 30px 20px; border-radius: 30px; }
      .back-button { width: 100%; }
    }
  </style>
</head>
<body>

  <div class="estrella-flotante" style="left: 8%; animation-duration: 9s; animation-delay: 1s;"></div>
  <div class="estrella-flotante" style="left: 22%; animation-duration: 14s; animation-delay: 0s; width: 16px; height: 16px;"></div>
  <div class="estrella-flotante" style="left: 40%; animation-duration: 11s; animation-delay: 4s; width: 28px; height: 28px;"></div>
  <div class="estrella-flotante" style="left: 73%; animation-duration: 15s; animation-delay: 2s; width: 14px; height: 14px;"></div>
  <div class="estrella-flotante" style="left: 88%; animation-duration: 10s; animation-delay: 3s;"></div>

  <main class="container">
    <h1>Equipo de Aventureros</h1> 
    <p class="subtitle">Este proyecto fue posible gracias a este increible equipo!</p>

    <div class="team-grid">
      <div class="member-card">
        <div class="avatar">💻</div>
        <div class="name">Hebert Juarez Islas</div>
        <div class="role">Programador Creativo</div>
      </div>

      <div class="member-card">
        <div class="avatar">🎨</div>
        <div class="name">Erick Daniel Chavez Cabanas</div>
        <div class="role">Diseñador Visual</div>
      </div>

      <div class="member-card">
        <div class="avatar">📝</div>
        <div class="name">Ruben Edain Ramirez Vargas</div>
        <div class="role">Gestor de Contenido</div>
      </div>

      <div class="member-card">
        <div class="avatar">💡</div>
        <div class="name">Yahel Javier Ramirez Martinez</div>
        <div class="role">Gestor de Contenido</div>
      </div>
    </div>

    <a href="index.html" class="back-button">Volver al inicio</a>
  </main>

</body>
</html>
